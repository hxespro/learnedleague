<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Learned League</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f5f5f5;
        margin: 0;
        padding: 20px;
    }

    h1 {
        text-align: center;
    }

    #container {
        max-width: 600px;
        margin: auto;
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    #messageInput {
        width: 100%;
        padding: 10px;
        font-size: 16px;
        border-radius: 5px;
        border: 1px solid #ccc;
    }

    button {
        margin-top: 10px;
        width: 100%;
        padding: 10px;
        font-size: 16px;
        background: #0078ff;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }

    button:hover {
        background: #005fcc;
    }

    ul {
        margin-top: 20px;
        padding: 0;
        list-style: none;
    }

    li {
        background: #e9e9e9;
        padding: 10px;
        margin-bottom: 10px;
        border-radius: 5px;
    }
</style>
</head>
<body>

<div id="container">
    <h1>Chat</h1>

    <input id="messageInput" placeholder="Write something..." />
    <button onclick="addMessage()">Post</button>

    <ul id="messagesList"></ul>
</div>

<script>
    // Load saved messages
    let messages = JSON.parse(localStorage.getItem("messages")) || [];

    function renderMessages() {
        const list = document.getElementById("messagesList");
        list.innerHTML = "";
        messages.forEach(msg => {
            const li = document.createElement("li");
            li.textContent = msg;
            list.appendChild(li);
        });
    }

    function addMessage() {
        const input = document.getElementById("messageInput");
        const text = input.value.trim();
        if (text === "") return;

        messages.push(text);
        localStorage.setItem("messages", JSON.stringify(messages));

        input.value = "";
        renderMessages();
    }

    renderMessages();
</script>

</body>
</html>
